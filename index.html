function getWatchlistSheet() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  if (!ss) {
    ss = SpreadsheetApp.openById("191uCR6yk4UEj8bUZikB1AR786VFIJ2SdER7cDTXrwY8");
  }
  var sheet = ss.getSheetByName("Watchlist");
  if (!sheet) {
    sheet = ss.insertSheet("Watchlist");
    sheet.appendRow(["ID", "Symbol", "Name", "Category", "Note"]);
    sheet.appendRow(["1", "2330", "台積電", "stock", "先進製程領先，長線看好。"]);
    sheet.appendRow(["2", "2317", "鴻海", "stock", "AI 伺服器主要受益者。"]);
    sheet.appendRow(["3", "0050", "元大台灣50", "etf", "台股大盤代表，適合定期定額。"]);
    sheet.appendRow(["4", "00878", "國泰永續高股息", "etf", "季配息，波動度穩健。"]);
    sheet.appendRow(["5", "WTX&", "台指期近月", "stock", "大盤期貨（含夜盤與即時行情）。"]);
    sheet.appendRow(["6", "TSM", "台積電 ADR", "us", "TSMC 美股存託憑證。"]);
    sheet.appendRow(["7", "NVDA", "輝達", "us", "全球 AI 晶片龍頭。"]);
    sheet.appendRow(["8", "AAPL", "蘋果", "us", "消費性電子與軟體生態系巨擘。"]);
    sheet.appendRow(["9", "QQQ", "納斯達克 100 ETF", "us", "追蹤納斯達克 100 指數之 ETF。"]);
  }
  return sheet;
}

function normalizeSymbol(symbol) {
  if (symbol === undefined || symbol === null) return "";
  var cleanSymbol = symbol.trim().toUpperCase();
  if (/^\d+$/.test(cleanSymbol)) {
    var num = parseInt(cleanSymbol, 10);
    if (num < 100) cleanSymbol = ("0000" + cleanSymbol).slice(-4);
    else if (num < 1000) cleanSymbol = ("00000" + cleanSymbol).slice(-5);
  }
  if (cleanSymbol === "TWII" || cleanSymbol === "^TWII") return "^TWII";
  if (cleanSymbol === "TWOII" || cleanSymbol === "^TWOII") return "^TWOII";
  if (cleanSymbol === "WTX&" || cleanSymbol === "WTXP&" || cleanSymbol === "WTX" || cleanSymbol === "WTXP") return "IX0126.TW";
  return cleanSymbol;
}

function getActiveSgxFuturesSymbol() {
  var date = new Date();
  var year = date.getFullYear() % 100;
  var month = date.getMonth();
  var monthCodes = ['F', 'G', 'H', 'J', 'K', 'M', 'N', 'Q', 'U', 'V', 'X', 'Z'];
  return "TWN-" + monthCodes[month] + year + ".SI";
}

function getSgxScaledIntradayData(sgxSymbol) {
  var cacheBuster = new Date().getTime();
  var url = "https://query2.finance.yahoo.com/v8/finance/chart/" + encodeURIComponent(sgxSymbol) + "?range=1d&interval=1m&_t=" + cacheBuster;
  var twiiQuote = fetchLiveQuoteFromUrl("^TWII");
  var basePrice = twiiQuote ? twiiQuote.price : 47000;
  
  try {
    var response = UrlFetchApp.fetch(url, { muteHttpExceptions: true });
    if (response.getResponseCode() !== 200) return [];
    var json = JSON.parse(response.getContentText());
    if (json.chart && json.chart.result && json.chart.result.length > 0) {
      var result = json.chart.result[0];
      var timestamps = result.timestamp || [];
      var indicators = result.indicators.quote[0];
      var closes = indicators.close || [];
      var firstValidClose = null;
      for (var k = 0; k < closes.length; k++) {
        if (closes[k] !== null && closes[k] !== undefined) {
          firstValidClose = closes[k]; break;
        }
      }
      if (!firstValidClose) return [];
      var scale = basePrice / firstValidClose;
      var data = [];
      for (var i = 0; i < timestamps.length; i++) {
        if (closes[i] === null || closes[i] === undefined) continue;
        data.push({
          time: timestamps[i],
          value: parseFloat((closes[i] * scale).toFixed(0)),
          close: parseFloat((closes[i] * scale).toFixed(0))
        });
      }
      return data;
    }
  } catch (e) {}
  return [];
}

function getTaiexFuturesLiveQuote() {
  var sgxSymbol = getActiveSgxFuturesSymbol();
  var sgxQuote = fetchLiveQuoteFromUrl(sgxSymbol);
  var twiiQuote = fetchLiveQuoteFromUrl("^TWII");
  
  if (!sgxQuote || !twiiQuote) {
    var twiiVal = fetchLiveQuoteFromUrl("^TWII");
    if (twiiVal) return twiiVal;
    var ixVal = fetchLiveQuoteFromUrl("IX0126.TW");
    if (ixVal) {
      var scale = ixVal.price < 35000 ? 1.815 : 1.0;
      return {
        price: parseFloat((ixVal.price * scale).toFixed(0)),
        change: parseFloat((ixVal.change * scale).toFixed(0)),
        changePercent: ixVal.changePercent,
        open: parseFloat((ixVal.open * scale).toFixed(0)),
        high: parseFloat((ixVal.high * scale).toFixed(0)),
        low: parseFloat((ixVal.low * scale).toFixed(0)),
        volume: ixVal.volume
      };
    }
    return null;
  }
  
  var changePercent = sgxQuote.changePercent;
  var price = twiiQuote.price * (1 + changePercent);
  return {
    price: parseFloat(price.toFixed(0)),
    change: parseFloat((price - twiiQuote.price).toFixed(0)),
    changePercent: parseFloat(changePercent.toFixed(4)),
    open: parseFloat((twiiQuote.open * (1 + changePercent)).toFixed(0)),
    high: parseFloat((twiiQuote.high * (1 + changePercent)).toFixed(0)),
    low: parseFloat((twiiQuote.low * (1 + changePercent)).toFixed(0)),
    volume: sgxQuote.volume
  };
}

function resolveTickerSuffix(cleanSymbol) {
  if (cleanSymbol.indexOf(".") !== -1 || cleanSymbol === "^TWII" || cleanSymbol === "^TWOII") return "";
  var cache = CacheService.getScriptCache();
  var cachedSuffix = cache.get("suffix_v4_" + cleanSymbol);
  if (cachedSuffix) return cachedSuffix;

  try {
    var urlTW = "https://query2.finance.yahoo.com/v8/finance/chart/" + encodeURIComponent(cleanSymbol + ".TW") + "?interval=1m&range=1d";
    var res = UrlFetchApp.fetch(urlTW, { muteHttpExceptions: true });
    if (res.getResponseCode() === 200) {
      cache.put("suffix_v4_" + cleanSymbol, ".TW", 21600);
      return ".TW";
    } else if (res.getResponseCode() === 404) {
      cache.put("suffix_v4_" + cleanSymbol, ".TWO", 21600);
      return ".TWO";
    }
  } catch (e) {}
  return ".TWO";
}

function fetchLiveQuoteFromUrl(resolvedTicker) {
  var cacheBuster = new Date().getTime(); // 強制穿透快取，確保日盤即時跳動
  var url = "https://query2.finance.yahoo.com/v8/finance/chart/" + encodeURIComponent(resolvedTicker) + "?interval=1m&range=1d&_t=" + cacheBuster;
  
  try {
    var response = UrlFetchApp.fetch(url, { muteHttpExceptions: true });
    if (response.getResponseCode() !== 200) return null;
    var json = JSON.parse(response.getContentText());
    if (!json.chart || !json.chart.result || json.chart.result.length === 0) return null;

    var result = json.chart.result[0];
    var meta = result.meta;
    var price = meta.regularMarketPrice;
    var prevClose = meta.chartPreviousClose || meta.previousClose;
    
    if (price === null || price === undefined) {
      var closes = (result.indicators.quote[0] && result.indicators.quote[0].close) || [];
      var validCloses = closes.filter(function(x) { return x !== null; });
      if (validCloses.length > 0) price = validCloses[validCloses.length - 1];
    }
    
    if (price === null || price === undefined || isNaN(price)) return null;

    var change = prevClose ? price - prevClose : 0;
    var changePercent = prevClose ? change / prevClose : 0;

    return {
      price: parseFloat(price.toFixed(2)),
      change: parseFloat(change.toFixed(2)),
      changePercent: parseFloat(changePercent.toFixed(4)),
      open: parseFloat((meta.regularMarketOpen || price).toFixed(2)),
      high: parseFloat(price.toFixed(2)), // 簡化版，以price為基準
      low: parseFloat(price.toFixed(2)),
      volume: 0
    };
  } catch (e) {
    return null;
  }
}

function getLiveQuote(ticker) {
  if (!ticker) return null;
  var cleanSymbol = normalizeSymbol(ticker);
  if (cleanSymbol === "IX0126.TW") return getTaiexFuturesLiveQuote();
  if (/^[A-Z]+$/.test(cleanSymbol)) return fetchLiveQuoteFromUrl(cleanSymbol);
  if (cleanSymbol.indexOf(".") !== -1 || cleanSymbol === "^TWII" || cleanSymbol === "^TWOII") return fetchLiveQuoteFromUrl(cleanSymbol);
  
  var suffix = resolveTickerSuffix(cleanSymbol);
  return fetchLiveQuoteFromUrl(cleanSymbol + suffix);
}

function getHistoricalData(symbol, range) {
  var ticker = resolveTickerSuffix(normalizeSymbol(symbol)) ? normalizeSymbol(symbol) + resolveTickerSuffix(normalizeSymbol(symbol)) : normalizeSymbol(symbol);
  if (ticker === "IX0126.TW" && range === "1d") return getSgxScaledIntradayData(getActiveSgxFuturesSymbol());

  var interval = range === "1d" ? "1m" : "1d";
  var yahooRange = range === "1d" ? "1d" : (range === "1m" || range === "1mo" ? "1mo" : "3mo");
  var cacheBuster = new Date().getTime();
  
  var url = "https://query2.finance.yahoo.com/v8/finance/chart/" + encodeURIComponent(ticker) + "?range=" + yahooRange + "&interval=" + interval + "&_t=" + cacheBuster;
  try {
    var response = UrlFetchApp.fetch(url, { muteHttpExceptions: true });
    if (response.getResponseCode() !== 200) return [];
    var json = JSON.parse(response.getContentText());
    if (json.chart && json.chart.result && json.chart.result.length > 0) {
      var result = json.chart.result[0];
      var timestamps = result.timestamp || [];
      var indicators = result.indicators.quote[0];
      var candles = [];
      var scale = 1.0;
      
      for (var i = 0; i < timestamps.length; i++) {
        if (indicators.open[i] === null) continue;
        candles.push({
          time: range === "1d" ? timestamps[i] : new Date(timestamps[i]*1000).toISOString().split('T')[0],
          open: parseFloat((indicators.open[i] * scale).toFixed(2)),
          high: parseFloat((indicators.high[i] * scale).toFixed(2)),
          low: parseFloat((indicators.low[i] * scale).toFixed(2)),
          close: parseFloat((indicators.close[i] * scale).toFixed(2)),
          value: parseFloat((indicators.close[i] * scale).toFixed(2))
        });
      }
      return candles;
    }
  } catch (e) {}
  return [];
}

function loadWatchlistAndQuotes() {
  var sheet = getWatchlistSheet();
  var rows = sheet.getDataRange().getValues();
  var watchlist = [];
  for (var i = 1; i < rows.length; i++) {
    var symbol = String(rows[i][1]).trim();
    if (!symbol) continue;
    var cleanSym = symbol.toUpperCase();
    var category = String(rows[i][3]);
    if (/^00/.test(cleanSym)) category = "etf";
    if (/^[A-Z]+$/.test(cleanSym)) category = "us";

    watchlist.push({
      id: String(rows[i][0]),
      symbol: symbol,
      name: String(rows[i][2]),
      category: category,
      note: String(rows[i][4]),
      quote: getLiveQuote(symbol) || {}
    });
  }
  return {
    status: "success",
    watchlist: watchlist,
    indices: {
      twii: getLiveQuote("^TWII") || {},
      twoii: getLiveQuote("^TWOII") || {},
      wtx: getLiveQuote("WTX&") || {}
    }
  };
}

function doGet(e) {
  if (e.parameter.action === "getChart") {
    return ContentService.createTextOutput(JSON.stringify({
      status: "success", candles: getHistoricalData(e.parameter.symbol, e.parameter.range || "3m")
    })).setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService.createTextOutput(JSON.stringify(loadWatchlistAndQuotes())).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var postData = JSON.parse(e.postData.contents);
  var sheet = getWatchlistSheet();
  if (sheet.getLastRow() > 1) sheet.getRange(2, 1, sheet.getLastRow() - 1, 5).clearContent();
  for (var i = 0; i < postData.length; i++) {
    sheet.appendRow([postData[i].id, postData[i].symbol, postData[i].name, postData[i].category, postData[i].note || ""]);
  }
  return ContentService.createTextOutput(JSON.stringify({ status: "success" })).setMimeType(ContentService.MimeType.JSON);
}
</script>

            }, [gasUrl]);

            // 1. 負責初始化畫布與拉取原始資料 (rawChartData)
            useEffect(() => {
                if (!chartContainerRef.current || !selectedSymbol) return;

                const isDark = theme === 'dark';
                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth,
                    height: 320,
                    layout: { background: { color: 'transparent' }, textColor: isDark ? '#94a3b8' : '#475569' },
                    grid: {
                        vertLines: { color: isDark ? 'rgba(148, 163, 184, 0.05)' : 'rgba(71, 85, 105, 0.05)' },
                        horzLines: { color: isDark ? 'rgba(148, 163, 184, 0.05)' : 'rgba(71, 85, 105, 0.05)' },
                    },
                    rightPriceScale: { borderColor: isDark ? '#475569' : '#cbd5e1' },
                    timeScale: { borderColor: isDark ? '#475569' : '#cbd5e1', timeVisible: chartType === "trend" },
                });

                let series;
                if (chartType === "trend") {
                    const activeQuote = selectedSymbol === "^TWII" ? indexQuotes.twii : selectedSymbol === "WTX&" ? indexQuotes.wtx : (watchlist.find(x => x.symbol === selectedSymbol)?.quote || {});
                    const isUp = activeQuote.change >= 0;
                    series = chart.addAreaSeries({
                        lineColor: isUp ? '#ef4444' : '#22c55e',
                        topColor: isUp ? 'rgba(239, 68, 68, 0.3)' : 'rgba(34, 197, 94, 0.3)',
                        bottomColor: 'rgba(0, 0, 0, 0)',
                        lineWidth: 2,
                    });
                } else {
                    series = chart.addCandlestickSeries({
                        upColor: '#ef4444', downColor: '#22c55e',
                        borderUpColor: '#ef4444', borderDownColor: '#22c55e',
                        wickUpColor: '#ef4444', wickDownColor: '#22c55e',
                    });
                }

                chartInstanceRef.current = chart;
                candlestickSeriesRef.current = series;

                setChartLoading(true);
                const apiRange = chartType === "trend" ? "1d" : klineRange.toLowerCase();
                const finalChartUrl = `${gasUrl}?action=getChart&symbol=${selectedSymbol}&range=${apiRange}&nocache=${Date.now()}`;

                fetch(finalChartUrl, { cache: "no-store" })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.candles) {
                            setRawChartData(data.candles);
                        }
                    })
                    .finally(() => setChartLoading(false));

                const handleResize = () => chart.applyOptions({ width: chartContainerRef.current.clientWidth });
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    chart.remove();
                };
            }, [selectedSymbol, theme, klineRange, gasUrl, chartType]);

            // 2. 負責根據 futuresSession (日/夜盤) 過濾並填入圖表
            useEffect(() => {
                if (!rawChartData || rawChartData.length === 0 || !candlestickSeriesRef.current) return;
                
                let chartData = [...rawChartData];
                
                // 台指電子盤切換過濾邏輯
                if (selectedSymbol === "WTX&" && chartType === "trend") {
                    chartData = chartData.filter(candle => {
                        const { hour, minute } = getTaiwanTimeParts(candle.time);
                        const timeVal = hour * 100 + minute;
                        if (futuresSession === "day") {
                            return timeVal >= 845 && timeVal <= 1345;
                        } else {
                            // 夜盤: 15:00 ~ 次日 05:00
                            return timeVal >= 1500 || timeVal <= 500;
                        }
                    });
                }

                if (chartType === "trend") {
                    candlestickSeriesRef.current.setData(chartData.map(c => ({ time: c.time, value: c.value !== undefined ? c.value : c.close })));
                } else {
                    candlestickSeriesRef.current.setData(chartData);
                }
                chartInstanceRef.current.timeScale().fitContent();
            }, [rawChartData, futuresSession, chartType, selectedSymbol]);

            const toggleTheme = () => {
                const next = theme === 'dark' ? 'light' : 'dark';
                setTheme(next);
                document.documentElement.classList.toggle('dark', next === 'dark');
            };

            const filteredWatchlist = useMemo(() => {
                return watchlist.filter(item => {
                    if (!item.symbol.toUpperCase().includes(searchQuery.toUpperCase()) && !item.name.includes(searchQuery)) return false;
                    if (activeTab === "stock") return item.category === "stock";
                    if (activeTab === "etf") return item.category === "etf";
                    if (activeTab === "us") return item.category === "us";
                    return true;
                });
            }, [watchlist, searchQuery, activeTab]);

            const activeStockInfo = useMemo(() => {
                if (selectedSymbol === "^TWII") return { symbol: "^TWII", name: "加權指數", category: "index", quote: indexQuotes.twii };
                if (selectedSymbol === "^TWOII") return { symbol: "^TWOII", name: "櫃買指數", category: "index", quote: indexQuotes.twoii };
                if (selectedSymbol === "WTX&") return { symbol: "WTX&", name: "台指電子盤", category: "index", quote: indexQuotes.wtx };
                return watchlist.find(item => item.symbol === selectedSymbol);
            }, [selectedSymbol, watchlist, indexQuotes]);

            const selectedQuote = activeStockInfo?.quote;

            const handleQuickAdd = (sym, name) => {
                setNewSymbol(sym);
                setNewNamePreview(name);
                setNewCategory('us');
            };

            return (
                <div className="flex flex-col h-screen min-h-0 bg-slate-50 dark:bg-darkBg overflow-hidden font-sans">
                    {/* 頂部導覽列 */}
                    <header className="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm shrink-0">
                        <div className="flex items-center space-x-3">
                            <div className="bg-indigo-600 text-white p-1.5 rounded-lg shadow-md"><Icons.TrendingUp /></div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800 dark:text-white">台股報價自選面板 Pro</h1>
                                <p className="text-xs text-slate-500 dark:text-slate-400 font-semibold">Yahoo API 快取穿透 • 台指電子盤</p>
                            </div>
                        </div>
                        <div className="flex items-center space-x-2 md:space-x-3">
                            <button onClick={loadDataFromCloud} className={`p-2.5 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition ${syncLoading?'animate-spin text-indigo-500':''}`} title="強制更新"><Icons.Refresh /></button>
                            <button onClick={toggleTheme} className="p-2.5 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition" title="切換主題">{theme === 'dark' ? <Icons.Sun /> : <Icons.Moon />}</button>
                            <button onClick={() => setShowAddModal(true)} className="flex items-center space-x-1.5 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg shadow-md transition">
                                <Icons.Plus /><span>新增標的</span>
                            </button>
                        </div>
                    </header>

                    {/* 大盤走勢橫幅 */}
                    <div className="flex items-center space-x-4 md:space-x-8 px-6 py-2.5 bg-slate-100 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-800 text-xs shrink-0 overflow-x-auto no-scrollbar">
                        {['twii', 'twoii', 'wtx'].map((idxType, i) => {
                            const q = indexQuotes[idxType];
                            const name = idxType === 'twii' ? '加權指數' : idxType === 'twoii' ? '櫃買指數' : '台指電子盤';
                            return (
                                <React.Fragment key={idxType}>
                                    <div className="flex items-center space-x-2 shrink-0 cursor-pointer" onClick={() => { setSelectedSymbol(idxType === 'wtx' ? 'WTX&' : `^${idxType.toUpperCase()}`); setChartType('trend'); }}>
                                        <span className="font-bold text-slate-500 dark:text-slate-400">{name}:</span>
                                        <span className="font-black text-slate-800 dark:text-slate-100 font-mono">{q.price ? q.price.toLocaleString() : "..."}</span>
                                        {q.change !== undefined && (
                                            <span className={`font-bold font-mono ${q.change >= 0 ? 'text-upRed' : 'text-downGreen'}`}>
                                                {q.change >= 0 ? '▲' : '▼'}{safeToFixed(Math.abs(q.change))}
                                            </span>
                                        )}
                                    </div>
                                    {i < 2 && <div className="w-[1px] h-3 bg-slate-300 dark:bg-slate-700 shrink-0"></div>}
                                </React.Fragment>
                            )
                        })}
                    </div>

                    <main className="flex flex-col lg:flex-row flex-1 min-h-0">
                        {/* 左側自選列表 */}
                        <section className="w-full lg:w-[420px] border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col min-h-0">
                            <div className="p-4 border-b border-slate-100 dark:border-slate-800 shrink-0">
                                <div className="relative">
                                    <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><Icons.Search /></span>
                                    <input type="text" placeholder="搜尋代號或名稱..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 bg-transparent" />
                                </div>
                            </div>

                            <div className="flex border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 p-1.5 shrink-0">
                                {[{id:'all', label:'全部'}, {id:'stock', label:'個股'}, {id:'etf', label:'ETF'}, {id:'us', label:'美股&ADR'}].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-1.5 text-xs font-semibold rounded-md transition ${activeTab === tab.id ? "bg-white dark:bg-slate-800 text-indigo-600 shadow-sm" : "text-slate-500 hover:text-slate-800 dark:hover:text-slate-100"}`}>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            <div className="flex-1 overflow-y-auto divide-y divide-slate-100 dark:divide-slate-800/60 no-scrollbar">
                                {filteredWatchlist.map(item => {
                                    const q = item.quote || {};
                                    const isActive = item.symbol === selectedSymbol;
                                    const flash = flashStates[item.symbol];
                                    const flashClass = flash === 'up' ? 'flash-up' : flash === 'down' ? 'flash-down' : '';

                                    return (
                                        <div key={item.id} onClick={() => setSelectedSymbol(item.symbol)} className={`group flex items-center justify-between p-4 cursor-pointer transition ${isActive ? 'bg-indigo-50/60 dark:bg-slate-800/80 border-l-4 border-indigo-500' : 'hover:bg-slate-50 dark:hover:bg-slate-800/40'} ${flashClass}`}>
                                            <div>
                                                <div className="flex items-center space-x-2">
                                                    <span className="font-bold text-sm tracking-wide text-slate-800 dark:text-white">{item.symbol}</span>
                                                    <span className={`px-1.5 py-0.5 text-[10px] font-bold rounded ${item.category === "us" ? "bg-blue-100 dark:bg-blue-900/40 text-blue-600" : "bg-slate-100 dark:bg-slate-700 text-slate-500"}`}>{item.category.toUpperCase()}</span>
                                                </div>
                                                <div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{item.name}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-sm font-extrabold font-mono">{safeToFixed(q.price)}</div>
                                                {q.change !== undefined && (
                                                    <div className={`text-xs font-bold font-mono ${q.change >= 0 ? 'text-upRed' : 'text-downGreen'}`}>
                                                        {q.change >= 0 ? '+' : ''}{safeToFixed(q.change)} ({safePercent(q.changePercent)})
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        {}
                        <section className="flex-1 bg-slate-50 dark:bg-slate-900/30 flex flex-col min-h-0 overflow-y-auto p-4 md:p-6 space-y-6">
                            {activeStockInfo && selectedQuote ? (
                                <>
                                    {/* 指標與控制列 */}
                                    <div className="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 dark:border-slate-700/60 pb-4 mb-4">
                                            <div>
                                                <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center space-x-3">
                                                    <span>{activeStockInfo.name}</span>
                                                    <span className="text-lg text-slate-400 font-semibold tracking-wider">{activeStockInfo.symbol}</span>
                                                </h2>
                                                <div className="flex items-baseline space-x-3 mt-1">
                                                    <span className="text-3xl font-mono font-black">{safeToFixed(selectedQuote.price, getDecimals(selectedSymbol))}</span>
                                                    <span className={`text-lg font-bold font-mono ${selectedQuote.change >= 0 ? 'text-upRed' : 'text-downGreen'}`}>
                                                        {selectedQuote.change >= 0 ? '▲' : '▼'}{safeToFixed(Math.abs(selectedQuote.change), getDecimals(selectedSymbol))} ({safePercent(selectedQuote.changePercent)})
                                                    </span>
                                                </div>
                                            </div>
                                            
                                            {/* 切換工具列 */}
                                            <div className="flex flex-col items-end space-y-2">
                                                {selectedSymbol === "WTX&" && chartType === "trend" && (
                                                    <div className="flex bg-indigo-50 dark:bg-slate-900 p-1 rounded-lg border border-indigo-100 dark:border-slate-700 shadow-inner">
                                                        <button onClick={() => setFuturesSession("day")} className={`px-4 py-1.5 text-sm font-bold rounded-md transition ${futuresSession === "day" ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>☀️ 日盤 (08:45-13:45)</button>
                                                        <button onClick={() => setFuturesSession("night")} className={`px-4 py-1.5 text-sm font-bold rounded-md transition ${futuresSession === "night" ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>🌙 夜盤 (15:00-05:00)</button>
                                                    </div>
                                                )}
                                                <div className="flex space-x-4 text-sm font-bold bg-slate-100 dark:bg-slate-900 p-1 rounded-lg">
                                                    <button onClick={() => setChartType("trend")} className={`px-4 py-1.5 rounded-md transition ${chartType === "trend" ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-emerald-400 shadow-sm' : 'text-slate-500'}`}>分時走勢</button>
                                                    <button onClick={() => setChartType("kline")} className={`px-4 py-1.5 rounded-md transition ${chartType === "kline" ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-emerald-400 shadow-sm' : 'text-slate-500'}`}>日 K 線</button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="relative">
                                            {chartLoading && <div className="absolute inset-0 z-10 flex items-center justify-center bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm rounded-xl"><span className="text-indigo-600 font-bold animate-pulse">載入圖表中...</span></div>}
                                            <div ref={chartContainerRef} className="w-full h-[360px] rounded-xl overflow-hidden" />
                                        </div>
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-slate-400 font-bold">請選擇左側清單標的</div>
                            )}
                        </section>
                    </main>

                    {}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 backdrop-blur-sm p-4">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl shadow-2xl p-6">
                                <div className="flex justify-between mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">
                                    <h3 className="font-bold text-lg text-slate-800 dark:text-white">新增自選標的</h3>
                                    <button onClick={() => setShowAddModal(false)} className="text-slate-400">✕</button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500">輸入代號</label>
                                        <input type="text" value={newSymbol} onChange={(e) => setNewSymbol(e.target.value.toUpperCase())} placeholder="例: 2330, TSM, AAPL" className="w-full px-4 py-2 mt-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500">市場分類</label>
                                        <select value={newCategory} onChange={(e) => setNewCategory(e.target.value)} className="w-full px-4 py-2 mt-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500">
                                            <option value="stock">台股個股</option>
                                            <option value="etf">ETF 基金</option>
                                            <option value="us">美股 & ADR</option>
                                        </select>
                                    </div>
                                    
                                    {/* 美股快捷加入區塊 */}
                                    <div className="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-900/50">
                                        <span className="text-xs font-bold text-blue-600 dark:text-blue-400 block mb-2">🔥 熱門國際標的快速加入：</span>
                                        <div className="flex flex-wrap gap-2">
                                            {US_POPULAR_STOCKS.map(s => (
                                                <button key={s.sym} onClick={() => handleQuickAdd(s.sym, s.name)} className="px-2 py-1 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xs font-bold rounded shadow-sm border border-slate-200 dark:border-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition">
                                                    {s.sym}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => {
                                        if(!newSymbol) return;
                                        setWatchlist([...watchlist, { id: Date.now().toString(), symbol: newSymbol, name: newNamePreview || newSymbol, category: newCategory, quote: {} }]);
                                        setShowAddModal(false);
                                        triggerToast(`已加入標的: ${newSymbol}`);
                                        setNewSymbol("");
                                    }} className="w-full py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition">確定新增</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {toastMsg && (
                        <div className="fixed bottom-6 right-6 z-50 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl font-bold text-sm flex items-center space-x-2 animate-bounce">
                            <span>💡</span><span>{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
