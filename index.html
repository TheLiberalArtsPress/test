<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股報價自選面板 Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        upRed: '#ef4444',     /* 台灣習慣：紅漲 */
                        downGreen: '#22c55e', /* 台灣習慣：綠跌 */
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <!-- UMD React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // 註冊自訂預設集，將 React JSX Runtime 強制指定為 classic
        Babel.registerPreset('custom-preset', {
            presets: [
                [Babel.availablePresets['env'], { modules: false }],
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>
    <!-- Lightweight Charts (TradingView) -->
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-up {
            0% { background-color: rgba(239, 68, 68, 0.2); }
            100% { background-color: transparent; }
        }
        @keyframes pulse-down {
            0% { background-color: rgba(34, 197, 94, 0.2); }
            100% { background-color: transparent; }
        }
        .flash-up { animation: pulse-up 0.8s ease-out; }
        .flash-down { animation: pulse-down 0.8s ease-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200">

    <div id="root"></div>

    <script type="text/babel" data-presets="custom-preset">
        const { useState, useEffect, useMemo, useRef } = React;

        const safeToFixed = (val, decimals = 2) => {
            if (val === null || val === undefined || isNaN(Number(val))) return "—";
            return Number(val).toFixed(decimals);
        };

        const safePercent = (val, decimals = 2) => {
            if (val === null || val === undefined || isNaN(Number(val))) return "—";
            return (Number(val) * 100).toFixed(decimals) + "%";
        };

        const getTaiwanTimeParts = (unixTimestamp) => {
            const tzOffset = 8 * 60 * 60 * 1000;
            const date = new Date(unixTimestamp * 1000 + tzOffset);
            return {
                hour: date.getUTCHours(),
                minute: date.getUTCMinutes()
            };
        };

        const formatVolume = (vol, isFutures) => {
            if (vol === null || vol === undefined || isNaN(Number(vol))) return "—";
            const num = Number(vol);
            if (isFutures) {
                if (num >= 10000) return (num / 10000).toFixed(3) + " 萬口";
                return num.toLocaleString() + " 口";
            } else {
                if (num >= 1000000) return (num / 1000).toFixed(0) + " 張";
                return num.toLocaleString() + " 股";
            }
        };

        const getDecimals = (sym) => {
            if (sym === "WTX&") return 0;
            if (sym === "^TWII") return 2;
            if (sym === "^TWOII") return 2;
            return 2;
        };

        const Icons = {
            TrendingUp: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Cloud: ({ connected }) => <svg className={`w-5 h-5 ${connected ? 'text-blue-500' : 'text-slate-400'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
            Moon: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
            Sun: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z" /></svg>,
            Refresh: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M21 20v-5h-5.12" /></svg>
        };

        function App() {
            const [theme, setTheme] = useState('dark');
            
            // 已綁定您最新提供的 API 網址
            const [gasUrl, setGasUrl] = useState(() => {
                const local = localStorage.getItem('stockwatch_gas_url_v4');
                const defaultUrl = 'https://script.google.com/macros/s/AKfycbzxSD9zAnylmvH2DyxBB1AJL_7Jl3RI90UEinExB-G6oTncwPDvLUl_qS5IDoDXaPm0lA/exec';
                return local || defaultUrl;
            });

            const [cloudSyncEnabled, setCloudSyncEnabled] = useState(true);
            const [cloudConnected, setCloudConnected] = useState(false);
            const [syncLoading, setSyncLoading] = useState(false);
            const [chartLoading, setChartLoading] = useState(false);
            const [loadError, setLoadError] = useState(false);
            
            const [watchlist, setWatchlist] = useState(() => {
                const local = localStorage.getItem('stockwatch_list_v4');
                if (local) return JSON.parse(local);
                return [
                    { id: "1", symbol: "2330", name: "台積電", category: "stock", note: "", quote: {} },
                    { id: "2", symbol: "2317", name: "鴻海", category: "stock", note: "", quote: {} },
                    { id: "5", symbol: "WTX&", name: "台指期近月", category: "stock", note: "", quote: {} },
                    { id: "6", symbol: "TSM", name: "台積電 ADR", category: "us", note: "", quote: {} }
                ];
            });

            const [selectedSymbol, setSelectedSymbol] = useState("2330");
            const [activeTab, setActiveTab] = useState("all");
            const [searchQuery, setSearchQuery] = useState("");
            const [chartType, setChartType] = useState("trend");
            const [futuresSession, setFuturesSession] = useState("night");
            
            const [showAddModal, setShowAddModal] = useState(false);
            const [newSymbol, setNewSymbol] = useState("");
            const [newCategory, setNewCategory] = useState("stock");
            const [newNamePreview, setNewNamePreview] = useState("");
            const [addError, setAddError] = useState("");

            const [indexQuotes, setIndexQuotes] = useState({
                twii: { price: null, change: null, changePercent: null },
                twoii: { price: null, change: null, changePercent: null },
                wtx: { price: null, change: null, changePercent: null }
            });

            const [prevQuotesMap, setPrevQuotesMap] = useState({});
            const [flashStates, setFlashStates] = useState({});
            const [toastMsg, setToastMsg] = useState("");
            const [klineRange, setKlineRange] = useState("3M");
            
            const chartContainerRef = useRef(null);
            const chartInstanceRef = useRef(null);
            const candlestickSeriesRef = useRef(null);

            const triggerToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(""), 3000);
            };

            useEffect(() => {
                localStorage.setItem('stockwatch_list_v4', JSON.stringify(watchlist));
            }, [watchlist]);

            useEffect(() => {
                localStorage.setItem('stockwatch_gas_url_v4', gasUrl);
                setCloudSyncEnabled(!!gasUrl);
            }, [gasUrl]);

            const loadDataFromCloud = () => {
                if (!gasUrl) return;
                setSyncLoading(true);
                setLoadError(false);
                
                const cacheBuster = `_t=${Date.now()}`;
                const finalUrl = gasUrl.includes('?') ? `${gasUrl}&${cacheBuster}` : `${gasUrl}?${cacheBuster}`;

                fetch(finalUrl, { method: "GET", mode: "cors", cache: "no-store" })
                    .then(res => res.ok ? res.json() : Promise.reject(res))
                    .then(data => {
                        if (data && data.status === "success") {
                            const nextFlash = {};
                            const nextQuotes = {};
                            data.watchlist.forEach(item => {
                                const prev = prevQuotesMap[item.symbol];
                                const current = item.quote ? item.quote.price : null;
                                if (prev && current) {
                                    if (current > prev) nextFlash[item.symbol] = 'up';
                                    else if (current < prev) nextFlash[item.symbol] = 'down';
                                }
                                if (current) nextQuotes[item.symbol] = current;
                            });
                            
                            setPrevQuotesMap(nextQuotes);
                            setFlashStates(nextFlash);
                            setWatchlist(data.watchlist);
                            
                            if (data.indices && data.indices.twii && data.indices.twii.price !== null) {
                                setIndexQuotes(data.indices);
                            }
                            
                            setCloudConnected(true);
                            setLoadError(false);
                            setTimeout(() => setFlashStates({}), 800);
                        } else {
                            setCloudConnected(false);
                            setLoadError(true);
                        }
                    })
                    .catch(e => {
                        setCloudConnected(false);
                        setLoadError(true);
                        console.warn("API 連線失敗", e);
                    })
                    .finally(() => setSyncLoading(false));
            };

            useEffect(() => {
                loadDataFromCloud();
                const interval = setInterval(loadDataFromCloud, 30000);
                return () => clearInterval(interval);
            }, [gasUrl]);

            // 自動辨識名稱
            const STOCK_REGISTRY = {
                "2330": "台積電", "2317": "鴻海", "2454": "聯發科", 
                "0050": "元大台灣50", "00878": "國泰永續高股息",
                "TSM": "台積電 ADR", "NVDA": "輝達", "AAPL": "蘋果", "SPY": "標普500", "QQQ": "納指 ETF"
            };

            useEffect(() => {
                const s = newSymbol.trim().toUpperCase();
                if (s.length > 0) {
                    if (STOCK_REGISTRY[s]) {
                        setNewNamePreview(STOCK_REGISTRY[s]);
                    } else {
                        setNewNamePreview(`代號 (${s})`);
                    }
                } else {
                    setNewNamePreview("");
                }
                setAddError("");
            }, [newSymbol]);

            // 歷史 K 線渲染
            useEffect(() => {
                if (!chartContainerRef.current || !selectedSymbol) return;

                const isDark = theme === 'dark';
                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth,
                    height: 320,
                    layout: { background: { color: isDark ? '#1e293b' : '#ffffff' }, textColor: isDark ? '#94a3b8' : '#475569' },
                    grid: { vertLines: { color: isDark ? 'rgba(148,163,184,0.1)' : 'rgba(71,85,105,0.05)' }, horzLines: { color: isDark ? 'rgba(148,163,184,0.1)' : 'rgba(71,85,105,0.05)' } },
                    rightPriceScale: { borderColor: isDark ? '#475569' : '#cbd5e1' },
                    timeScale: { borderColor: isDark ? '#475569' : '#cbd5e1', timeVisible: chartType === "trend", secondsVisible: false },
                });

                let series;
                if (chartType === "trend") {
                    const activeQuote = selectedSymbol === "^TWII" ? indexQuotes.twii : selectedSymbol === "^TWOII" ? indexQuotes.twoii : selectedSymbol === "WTX&" ? indexQuotes.wtx : (watchlist.find(x => x.symbol === selectedSymbol)?.quote || {});
                    const isUp = activeQuote.change >= 0;
                    series = chart.addAreaSeries({
                        lineColor: isUp ? '#ef4444' : '#22c55e',
                        topColor: isUp ? 'rgba(239,68,68,0.3)' : 'rgba(34,197,94,0.3)',
                        bottomColor: 'rgba(0,0,0,0)',
                        lineWidth: 2,
                    });
                } else {
                    series = chart.addCandlestickSeries({
                        upColor: '#ef4444', downColor: '#22c55e', borderUpColor: '#ef4444', borderDownColor: '#22c55e', wickUpColor: '#ef4444', wickDownColor: '#22c55e',
                    });
                }

                setChartLoading(true);
                const apiRange = chartType === "trend" ? "1d" : klineRange.toLowerCase();
                const cacheBuster = `_t=${Date.now()}`;
                const finalChartUrl = `${gasUrl}${gasUrl.includes('?')?'&':'?'}action=getChart&symbol=${selectedSymbol}&range=${apiRange}&${cacheBuster}`;

                fetch(finalChartUrl, { cache: "no-store" })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.candles && data.candles.length > 0) {
                            let chartData = data.candles;
                            if (selectedSymbol === "WTX&" && chartType === "trend") {
                                chartData = chartData.filter(candle => {
                                    const { hour, minute } = getTaiwanTimeParts(candle.time);
                                    const timeVal = hour * 100 + minute;
                                    return futuresSession === "day" ? (timeVal >= 845 && timeVal <= 1345) : (timeVal >= 1500 || timeVal <= 500);
                                });
                            }
                            
                            if (chartType === "trend") {
                                series.setData(chartData.map(c => ({ time: c.time, value: c.value !== undefined ? c.value : c.close })));
                            } else {
                                series.setData(chartData);
                            }
                            chart.timeScale().fitContent();
                        }
                    })
                    .catch(err => console.warn("圖表資料載入失敗", err))
                    .finally(() => setChartLoading(false));

                chartInstanceRef.current = chart;
                candlestickSeriesRef.current = series;

                const handleResize = () => chart && chartContainerRef.current && chart.applyOptions({ width: chartContainerRef.current.clientWidth });
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    chart.remove();
                };
            }, [selectedSymbol, theme, klineRange, gasUrl, chartType, futuresSession]);

            const toggleTheme = () => {
                const nextTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(nextTheme);
                document.documentElement.classList.toggle('dark', nextTheme === 'dark');
            };

            // 【關鍵修正】：使用 text/plain 繞過 CORS 預檢，確保資料能寫入 Google Sheet
            const syncToCloud = (currentList) => {
                if (!gasUrl.trim()) return;
                setSyncLoading(true);
                fetch(gasUrl, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(currentList)
                })
                .then(() => {
                    triggerToast("☁️ 資料已成功即時同步至雲端試算表");
                    setTimeout(loadDataFromCloud, 1500);
                })
                .catch(e => console.error("雲端同步錯誤", e))
                .finally(() => setSyncLoading(false));
            };

            const handleAddStockSubmit = () => {
                const sym = newSymbol.trim().toUpperCase();
                if (!sym) return setAddError("請輸入代號");
                if (watchlist.some(item => item.symbol.toUpperCase() === sym)) return setAddError("該代號已在觀察名單中");

                const finalName = newNamePreview || `自訂(${sym})`;
                const nextList = [...watchlist, {
                    id: Date.now().toString(), symbol: sym, name: finalName, category: newCategory, note: "", quote: {}
                }];

                setWatchlist(nextList);
                setSelectedSymbol(sym);
                setNewSymbol("");
                setNewNamePreview("");
                setShowAddModal(false);
                triggerToast(`已成功新增觀察：${sym}`);

                if (cloudSyncEnabled) syncToCloud(nextList);
            };

            const handleDeleteStock = (id, symbol, e) => {
                e.stopPropagation();
                const filtered = watchlist.filter(item => item.id !== id);
                setWatchlist(filtered);
                triggerToast(`已將 ${symbol} 自觀察清單移除`);
                
                if (selectedSymbol === symbol) setSelectedSymbol(filtered.length > 0 ? filtered[0].symbol : null);
                if (cloudSyncEnabled) syncToCloud(filtered);
            };

            const handleNoteChange = (symbol, text) => setWatchlist(prev => prev.map(item => item.symbol === symbol ? { ...item, note: text } : item));
            const handleNoteBlur = () => { triggerToast("筆記已存檔"); if (cloudSyncEnabled) syncToCloud(watchlist); };

            const filteredWatchlist = useMemo(() => {
                return watchlist.filter(item => {
                    const matchesSearch = item.symbol.toUpperCase().includes(searchQuery.toUpperCase()) || item.name.includes(searchQuery);
                    if (!matchesSearch) return false;
                    if (activeTab === "stock") return item.category === "stock";
                    if (activeTab === "etf") return item.category === "etf";
                    if (activeTab === "us") return item.category === "us";
                    return true;
                });
            }, [watchlist, searchQuery, activeTab]);

            const activeStockInfo = useMemo(() => {
                if (selectedSymbol === "^TWII") return { symbol: "^TWII", name: "加權指數", category: "index", quote: indexQuotes.twii };
                if (selectedSymbol === "^TWOII") return { symbol: "^TWOII", name: "櫃買指數", category: "index", quote: indexQuotes.twoii };
                if (selectedSymbol === "WTX&") return { symbol: "WTX&", name: "台指電子盤", category: "index", quote: indexQuotes.wtx };
                return watchlist.find(item => item.symbol === selectedSymbol);
            }, [selectedSymbol, watchlist, indexQuotes]);

            const selectedQuote = activeStockInfo?.quote || null;

            return (
                <div className="flex flex-col h-screen min-h-0 bg-slate-50 dark:bg-darkBg overflow-hidden">
                    
                    {/* Header */}
                    <header className="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm shrink-0">
                        <div className="flex items-center space-x-3">
                            <div className="bg-upRed text-white p-1.5 rounded-lg"><Icons.TrendingUp /></div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800 dark:text-white">台股報價自選面板 Pro</h1>
                                <p className="text-xs text-slate-500">Yahoo API 實時對接 • Google 雲端同步</p>
                            </div>
                        </div>
                        <div className="flex items-center space-x-3">
                            <button onClick={loadDataFromCloud} className={`p-2.5 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition ${syncLoading ? 'opacity-50' : ''}`} title="強制刷新"><Icons.Refresh /></button>
                            <button onClick={toggleTheme} className="p-2.5 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition" title="切換主題">{theme === 'dark' ? <Icons.Sun /> : <Icons.Moon />}</button>
                            <button onClick={() => setShowAddModal(true)} className="flex items-center space-x-1.5 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg shadow-md transition"><Icons.Plus /><span>新增標的</span></button>
                        </div>
                    </header>

                    {/* 指數跑馬燈 */}
                    <div className="flex items-center justify-center space-x-8 px-6 py-2.5 bg-slate-100 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-800 text-xs shrink-0 overflow-x-auto no-scrollbar">
                        {['twii', 'twoii', 'wtx'].map((idxKey, i) => {
                            const q = indexQuotes[idxKey];
                            const name = idxKey === 'twii' ? '加權指數' : idxKey === 'twoii' ? '櫃買指數' : '台指電子盤';
                            return (
                                <React.Fragment key={idxKey}>
                                    <div className="flex items-center space-x-2 shrink-0">
                                        <span className="font-bold text-slate-500">{name}:</span>
                                        <span className="font-black font-mono">{q.price ? q.price.toLocaleString(undefined, {maximumFractionDigits:2}) : "連線中..."}</span>
                                        {q.price && (
                                            <span className={`font-bold font-mono ${q.change >= 0 ? 'text-upRed' : 'text-downGreen'}`}>
                                                {q.change >= 0 ? '▲' : '▼'}{safeToFixed(Math.abs(q.change))}
                                            </span>
                                        )}
                                    </div>
                                    {i < 2 && <div className="w-[1px] h-3 bg-slate-300 dark:bg-slate-700 shrink-0"></div>}
                                </React.Fragment>
                            );
                        })}
                    </div>

                    <main className="flex flex-col lg:flex-row flex-1 min-h-0">
                        {/* 左側：自選清單 */}
                        <section className="w-full lg:w-[420px] border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col min-h-0">
                            <div className="p-4 border-b border-slate-100 dark:border-slate-800 shrink-0">
                                <div className="relative">
                                    <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><Icons.Search /></span>
                                    <input type="text" placeholder="搜尋代號、名稱..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                </div>
                            </div>
                            <div className="flex border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 p-1.5 shrink-0">
                                {['all', 'stock', 'etf', 'us'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 text-xs font-semibold rounded-md transition ${activeTab === tab ? "bg-white dark:bg-slate-800 text-indigo-600 shadow-sm" : "text-slate-500 hover:text-slate-800 dark:hover:text-slate-100"}`}>
                                        {tab === 'all' ? '全部' : tab === 'stock' ? '個股' : tab === 'etf' ? 'ETF' : '美股'}
                                    </button>
                                ))}
                            </div>
                            <div className="flex-1 overflow-y-auto divide-y divide-slate-100 dark:divide-slate-800/60 no-scrollbar">
                                {filteredWatchlist.map(item => {
                                    const q = item.quote || {};
                                    const isActive = item.symbol === selectedSymbol;
                                    const flashClass = flashStates[item.symbol] === 'up' ? 'flash-up' : flashStates[item.symbol] === 'down' ? 'flash-down' : '';

                                    return (
                                        <div key={item.id} onClick={() => setSelectedSymbol(item.symbol)} className={`group flex items-center justify-between p-4 cursor-pointer transition ${isActive ? 'bg-indigo-50/60 dark:bg-slate-800/80 border-l-4 border-indigo-600' : 'hover:bg-slate-50 dark:hover:bg-slate-800/30'} ${flashClass}`}>
                                            <div>
                                                <div className="flex items-center space-x-1.5">
                                                    <span className="font-bold text-sm tracking-wide">{item.symbol}</span>
                                                    <span className={`px-1.5 py-0.5 text-[10px] font-bold rounded ${item.category === "etf" ? "bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50" : item.category === "us" ? "bg-blue-100 text-blue-700 dark:bg-blue-900/40" : "bg-red-100 text-red-700 dark:bg-red-900/40"}`}>
                                                        {item.category.toUpperCase()}
                                                    </span>
                                                </div>
                                                <div className="text-xs text-slate-500 truncate mt-0.5 max-w-[150px]">{item.name}</div>
                                            </div>
                                            <div className="flex items-center space-x-4">
                                                <div className="text-right">
                                                    <div className="text-sm font-extrabold font-mono">{safeToFixed(q.price)}</div>
                                                    {q.price && (
                                                        <div className={`text-xs font-bold flex items-center justify-end space-x-1 ${q.change >= 0 ? 'text-upRed' : 'text-downGreen'}`}>
                                                            <span>{q.change >= 0 ? '+' : ''}{safeToFixed(q.change)}</span>
                                                        </div>
                                                    )}
                                                </div>
                                                <button onClick={(e) => handleDeleteStock(item.id, item.symbol, e)} className="p-1.5 rounded-md hover:bg-red-50 text-slate-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition"><Icons.Trash /></button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        {/* 右側：圖表與詳情 */}
                        <section className="flex-1 bg-slate-50 dark:bg-slate-900/30 flex flex-col min-h-0 overflow-y-auto p-4 md:p-6 space-y-6">
                            {selectedSymbol && activeStockInfo && (
                                <>
                                    {/* 標題與即時報價卡片 (個股/ETF/美股) */}
                                    {!(selectedSymbol === "^TWII" || selectedSymbol === "^TWOII" || selectedSymbol === "WTX&") && (
                                        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800">
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <h2 className="text-xl font-black text-slate-800 dark:text-white flex items-center space-x-2">
                                                        <span>{selectedSymbol}</span>
                                                        <span className="text-sm text-slate-500 font-semibold">{activeStockInfo.name}</span>
                                                    </h2>
                                                </div>
                                                <div className="flex items-baseline space-x-4">
                                                    <div className="text-3xl font-black font-mono tracking-tight">{safeToFixed(selectedQuote?.price)}</div>
                                                    {selectedQuote?.price && (
                                                        <div className={`text-base font-bold flex items-center ${selectedQuote.change >= 0 ? 'text-upRed' : 'text-downGreen'}`}>
                                                            <span className="mr-1">{selectedQuote.change >= 0 ? '▲' : '▼'}</span>
                                                            <span>{safeToFixed(Math.abs(selectedQuote.change))} ({safePercent(selectedQuote.changePercent)})</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-4 gap-4 mt-6 pt-6 border-t border-slate-100 dark:border-slate-700/60">
                                                <div><p className="text-[10px] text-slate-400">開盤</p><p className="font-mono font-bold mt-1">{safeToFixed(selectedQuote?.open)}</p></div>
                                                <div><p className="text-[10px] text-slate-400">最高</p><p className="font-mono font-bold mt-1 text-upRed">{safeToFixed(selectedQuote?.high)}</p></div>
                                                <div><p className="text-[10px] text-slate-400">最低</p><p className="font-mono font-bold mt-1 text-downGreen">{safeToFixed(selectedQuote?.low)}</p></div>
                                                <div><p className="text-[10px] text-slate-400">成交量</p><p className="font-mono font-bold mt-1">{formatVolume(selectedQuote?.volume, false)}</p></div>
                                            </div>
                                        </div>
                                    )}

                                    {/* 圖表區塊 */}
                                    <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800">
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="flex space-x-6 text-sm font-bold">
                                                <button onClick={() => setChartType("trend")} className={`pb-2 border-b-2 ${chartType === "trend" ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>走勢</button>
                                                <button onClick={() => setChartType("kline")} className={`pb-2 border-b-2 ${chartType === "kline" ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>K線</button>
                                            </div>
                                            
                                            {/* 日夜盤切換按鈕 (台指期專用) */}
                                            {selectedSymbol === "WTX&" && chartType === "trend" && (
                                                <div className="flex bg-slate-100 dark:bg-slate-900 p-0.5 rounded-lg border border-slate-200 dark:border-slate-800">
                                                    <button onClick={() => setFuturesSession("day")} className={`px-3 py-1 text-xs font-bold rounded-md ${futuresSession === "day" ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>日盤</button>
                                                    <button onClick={() => setFuturesSession("night")} className={`px-3 py-1 text-xs font-bold rounded-md ${futuresSession === "night" ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>夜盤</button>
                                                </div>
                                            )}
                                        </div>
                                        <div ref={chartContainerRef} className="w-full h-[320px] bg-white dark:bg-slate-800 rounded-xl" />
                                    </div>
                                </>
                            )}
                        </section>
                    </main>

                    {/* 新增標的 Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 backdrop-blur-sm p-4">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl p-6 shadow-2xl">
                                <div className="flex items-center justify-between pb-4 border-b border-slate-100 dark:border-slate-700">
                                    <h3 className="font-bold text-slate-800 dark:text-white">新增自選觀察標的</h3>
                                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-slate-600">✕</button>
                                </div>
                                <div className="py-4 space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">股票或 ETF 代號</label>
                                        <input type="text" value={newSymbol} onChange={(e) => setNewSymbol(e.target.value)} placeholder="例如: 2330, TSM, QQQ" className="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm" />
                                    </div>
                                    
                                    {/* 🔥 快速加入按鈕 */}
                                    <div className="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-800">
                                        <label className="text-xs font-bold text-slate-500 mb-2 block">🔥 快速加入熱門標的</label>
                                        <div className="flex flex-wrap gap-2">
                                            <button onClick={() => { setNewSymbol("TSM"); setNewCategory("us"); }} className="px-2 py-1 text-xs font-bold bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200">TSM (台積電ADR)</button>
                                            <button onClick={() => { setNewSymbol("NVDA"); setNewCategory("us"); }} className="px-2 py-1 text-xs font-bold bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200">NVDA (輝達)</button>
                                            <button onClick={() => { setNewSymbol("AAPL"); setNewCategory("us"); }} className="px-2 py-1 text-xs font-bold bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200">AAPL (蘋果)</button>
                                            <button onClick={() => { setNewSymbol("QQQ"); setNewCategory("etf"); }} className="px-2 py-1 text-xs font-bold bg-indigo-100 text-indigo-700 rounded-md hover:bg-indigo-200">QQQ (納指 ETF)</button>
                                            <button onClick={() => { setNewSymbol("SPY"); setNewCategory("etf"); }} className="px-2 py-1 text-xs font-bold bg-indigo-100 text-indigo-700 rounded-md hover:bg-indigo-200">SPY (標普 ETF)</button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">商品分類</label>
                                        <select value={newCategory} onChange={(e) => setNewCategory(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm">
                                            <option value="stock">一般個股 (Stock)</option>
                                            <option value="etf">指數型/高股息 (ETF)</option>
                                            <option value="us">美股熱門 & ADR</option>
                                        </select>
                                    </div>
                                    {addError && <div className="text-xs text-red-500 font-bold">{addError}</div>}
                                </div>
                                <div className="pt-4 flex space-x-3">
                                    <button onClick={() => setShowAddModal(false)} className="flex-1 py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 font-bold rounded-xl text-sm transition">取消</button>
                                    <button onClick={handleAddStockSubmit} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm transition">確定加入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast 提示 */}
                    {toastMsg && (
                        <div className="fixed bottom-6 right-6 z-50 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center space-x-2 animate-bounce">
                            <span>💡</span><span className="text-xs font-bold">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
