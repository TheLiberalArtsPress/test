<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股報價自選面板 Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        upRed: '#ef4444',     /* 台灣習慣：紅漲 */
                        downGreen: '#22c55e', /* 台灣習慣：綠跌 */
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <!-- UMD React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // 註冊自訂預設集，將 React JSX Runtime 強制指定為 classic (編譯為 React.createElement)
        // 避免 Babel 自動注入 ES Module 的 import 語句，解決瀏覽器 append 腳本時的模組載入衝突
        Babel.registerPreset('custom-preset', {
            presets: [
                [Babel.availablePresets['env'], { modules: false }],
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>
    <!-- Lightweight Charts (TradingView) -->
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        /* 隱藏滾動條但保持滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 漲跌脈搏動態特效 */
        @keyframes pulse-up {
            0% { background-color: rgba(239, 68, 68, 0.2); }
            100% { background-color: transparent; }
        }
        @keyframes pulse-down {
            0% { background-color: rgba(34, 197, 94, 0.2); }
            100% { background-color: transparent; }
        }
        .flash-up { animation: pulse-up 0.8s ease-out; }
        .flash-down { animation: pulse-down 0.8s ease-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-200">

    <div id="root"></div>

    <script type="text/babel" data-presets="custom-preset">
        const { useState, useEffect, useMemo, useRef } = React;

        // === 數值格式化安全防禦輔助函數 ===
        const safeToFixed = (val, decimals = 2) => {
            if (val === null || val === undefined || isNaN(Number(val))) return "—";
            return Number(val).toFixed(decimals);
        };

        const safePercent = (val, decimals = 2) => {
            if (val === null || val === undefined || isNaN(Number(val))) return "—";
            return (Number(val) * 100).toFixed(decimals) + "%";
        };

        // === 內建 SVG 圖標組 ===
        const Icons = {
            TrendingUp: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            ),
            Plus: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            ),
            Trash: () => (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            ),
            Cloud: ({ connected }) => (
                <svg className={`w-5 h-5 ${connected ? 'text-blue-500' : 'text-slate-400'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                </svg>
            ),
            Search: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            ),
            Moon: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            ),
            Sun: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
            ),
            Refresh: () => (
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M21 20v-5h-5.12" />
                </svg>
            ),
            Copy: () => (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a3 3 0 016 0m-3 0V7m0 6h4m-4 4h4m-4-8h4" />
                </svg>
            )
        };

        // 離線備用假資料生成器 (僅在雲端 API 失敗或無法連線時作為 K 線圖佔位 fallback)
        function generateHistoricalData(symbol, basePrice) {
            const seed = symbol.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            let currentPrice = basePrice || 100;
            const data = [];
            const count = 120;
            const now = new Date();
            for (let i = count; i >= 0; i--) {
                const date = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                const dateString = date.toISOString().split('T')[0];
                const changePercent = (Math.sin(seed + i * 0.1) * 0.012) + ((Math.random() - 0.5) * 0.015);
                const open = currentPrice;
                const close = currentPrice * (1 + changePercent);
                const high = Math.max(open, close) * (1 + Math.random() * 0.005);
                const low = Math.min(open, close) * (1 - Math.random() * 0.005);
                data.push({
                    time: dateString,
                    open: parseFloat(open.toFixed(2)),
                    high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)),
                    close: parseFloat(close.toFixed(2))
                });
                currentPrice = close;
            }
            return data;
        }

        function App() {
            const [theme, setTheme] = useState('dark');
            
            // 已更新：將預設的 Apps Script Web App 網址替換為您提供的最新 exec 部署網址
            const [gasUrl, setGasUrl] = useState(() => {
                const local = localStorage.getItem('stockwatch_gas_url');
                return local !== null ? local : 'https://script.google.com/macros/s/AKfycbZi4EahiVJPIupIN-l3NfxOFN3QZ9zSwNcHMLq3ZY7r2-eEeUGJUmIhR9mxSPfaj27dw/exec';
            });

            const [cloudSyncEnabled, setCloudSyncEnabled] = useState(true);
            const [cloudConnected, setCloudConnected] = useState(false);
            const [syncLoading, setSyncLoading] = useState(false);
            const [chartLoading, setChartLoading] = useState(false);
            const [loadError, setLoadError] = useState(false); // 錯誤提示狀態
            
            // 觀察清單狀態 (預設提供台股核心熱門股，雲端連通後會被雲端資料覆蓋)
            const [watchlist, setWatchlist] = useState(() => {
                const local = localStorage.getItem('stockwatch_list');
                if (local) return JSON.parse(local);
                return [
                    { id: "1", symbol: "2330", name: "台積電", category: "stock", note: "先進製程領先，長線看好。", quote: {} },
                    { id: "2", symbol: "2317", name: "鴻海", category: "stock", note: "AI 伺服器主要受益者。", quote: {} },
                    { id: "3", symbol: "0050", name: "元大台灣50", category: "etf", note: "台股大盤代表，適合定期定額。", quote: {} },
                    { id: "4", symbol: "00878", name: "國泰永續高股息", category: "etf", note: "季配息，波動度穩健。", quote: {} }
                ];
            });

            const [selectedSymbol, setSelectedSymbol] = useState("2330");
            const [activeTab, setActiveTab] = useState("all"); // all, stock, etf, settings
            const [searchQuery, setSearchQuery] = useState("");
            
            // 新增自選視窗狀態
            const [showAddModal, setShowAddModal] = useState(false);
            const [newSymbol, setNewSymbol] = useState("");
            const [newCategory, setNewCategory] = useState("stock");
            const [newNamePreview, setNewNamePreview] = useState("");
            const [addError, setAddError] = useState("");

            // 大盤加權與櫃買即時報價
            const [indexQuotes, setIndexQuotes] = useState({
                twii: { price: null, change: null, changePercent: null },
                twoii: { price: null, change: null, changePercent: null }
            });

            // 股價跳動快閃動畫狀態
            const [prevQuotesMap, setPrevQuotesMap] = useState({});
            const [flashStates, setFlashStates] = useState({});

            const [toastMsg, setToastMsg] = useState("");
            const [klineRange, setKlineRange] = useState("3M"); // 1M, 3M, 6M
            
            const chartContainerRef = useRef(null);
            const chartInstanceRef = useRef(null);
            const candlestickSeriesRef = useRef(null);

            const triggerToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(""), 3000);
            };

            // 儲存設定至 LocalStorage
            useEffect(() => {
                localStorage.setItem('stockwatch_list', JSON.stringify(watchlist));
            }, [watchlist]);

            useEffect(() => {
                localStorage.setItem('stockwatch_gas_url', gasUrl);
                if (gasUrl) {
                    setCloudSyncEnabled(true);
                } else {
                    setCloudSyncEnabled(false);
                    setCloudConnected(false);
                }
            }, [gasUrl]);

            // === 核心：從 Google Sheet API 即時抓取最新台股報價 (加入防止瀏覽器快取設定) ===
            const loadDataFromCloud = () => {
                if (!gasUrl) return;
                setSyncLoading(true);
                setLoadError(false);
                
                // 增加時戳，防堵瀏覽器與服務端 CORS 快取問題
                const cacheBuster = `_t=${Date.now()}`;
                const finalUrl = gasUrl.includes('?') ? `${gasUrl}&${cacheBuster}` : `${gasUrl}?${cacheBuster}`;

                fetch(finalUrl, { 
                    method: "GET", 
                    mode: "cors",
                    cache: "no-store" 
                })
                    .then(response => {
                        if (response.ok) {
                            return response.json();
                        }
                        throw new Error("HTTP error " + response.status);
                    })
                    .then(data => {
                        if (data && data.status === "success") {
                            // 比對股價有無變化，觸發漲跌快閃動態特效
                            const nextFlash = {};
                            data.watchlist.forEach(item => {
                                const prev = prevQuotesMap[item.symbol];
                                const current = item.quote ? item.quote.price : null;
                                if (prev && current) {
                                    if (current > prev) nextFlash[item.symbol] = 'up';
                                    else if (current < prev) nextFlash[item.symbol] = 'down';
                                }
                            });
                            
                            // 更新上一次的價格紀錄
                            const nextQuotes = {};
                            data.watchlist.forEach(item => {
                                if (item.quote) nextQuotes[item.symbol] = item.quote.price;
                            });
                            
                            setPrevQuotesMap(nextQuotes);
                            setFlashStates(nextFlash);
                            setWatchlist(data.watchlist);
                            
                            if (data.indices && data.indices.twii && data.indices.twii.price !== null) {
                                setIndexQuotes(data.indices);
                            }
                            
                            setCloudConnected(true);
                            setLoadError(false);
                            // 0.8秒後自動清除快閃狀態
                            setTimeout(() => setFlashStates({}), 800);
                        } else {
                            setCloudConnected(false);
                            setLoadError(true);
                        }
                    })
                    .catch(e => {
                        setCloudConnected(false);
                        setLoadError(true);
                        console.warn("GAS 報價更新通道連線失敗，請檢查 GAS 部署是否正確。", e);
                    })
                    .finally(() => {
                        setSyncLoading(false);
                    });
            };

            // 網頁初始化載入與自動定時器（每 30 秒自動刷新一次即時最新股價）
            useEffect(() => {
                loadDataFromCloud();
                const interval = setInterval(() => {
                    loadDataFromCloud();
                }, 30000);
                return () => clearInterval(interval);
            }, [gasUrl]);

            // 監聽新增代號之自動辨識
            useEffect(() => {
                const s = newSymbol.trim();
                if (s.length >= 4) {
                    if (MOCK_STOCK_REGISTRY[s]) {
                        setNewNamePreview(MOCK_STOCK_REGISTRY[s].name);
                        setNewCategory(MOCK_STOCK_REGISTRY[s].category);
                        setAddError("");
                    } else {
                        const isEtf = s.length >= 5 && /^00\d+$/.test(s);
                        setNewNamePreview(`代號 (${s})`);
                        setNewCategory(isEtf ? 'etf' : 'stock');
                        setAddError("");
                    }
                } else {
                    setNewNamePreview("");
                    setAddError("");
                }
            }, [newSymbol]);

            // === 歷史 K 線渲染：對接 GAS 的真實 Yahoo 歷史 Chart 歷史資料 (加入防快取時戳) ===
            useEffect(() => {
                if (!chartContainerRef.current || !selectedSymbol) return;

                const isDark = theme === 'dark';
                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    width: chartContainerRef.current.clientWidth,
                    height: 320,
                    layout: {
                        background: { color: isDark ? '#1e293b' : '#ffffff' },
                        textColor: isDark ? '#94a3b8' : '#475569',
                    },
                    grid: {
                        vertLines: { color: isDark ? 'rgba(148, 163, 184, 0.1)' : 'rgba(71, 85, 105, 0.05)' },
                        horzLines: { color: isDark ? 'rgba(148, 163, 184, 0.1)' : 'rgba(71, 85, 105, 0.05)' },
                    },
                    rightPriceScale: { borderColor: isDark ? '#475569' : '#cbd5e1' },
                    timeScale: { borderColor: isDark ? '#475569' : '#cbd5e1' },
                });

                const series = chart.addCandlestickSeries({
                    upColor: '#ef4444',
                    downColor: '#22c55e',
                    borderUpColor: '#ef4444',
                    borderDownColor: '#22c55e',
                    wickUpColor: '#ef4444',
                    wickDownColor: '#22c55e',
                });

                setChartLoading(true);
                const apiRange = klineRange.toLowerCase(); // '1m', '3m', '6m'

                // 增加快取時戳以向 GAS 請求真實 Yahoo OHLCV 資料
                const cacheBuster = `_t=${Date.now()}`;
                const finalChartUrl = gasUrl.includes('?') 
                    ? `${gasUrl}&action=getChart&symbol=${selectedSymbol}&range=${apiRange}&${cacheBuster}`
                    : `${gasUrl}?action=getChart&symbol=${selectedSymbol}&range=${apiRange}&${cacheBuster}`;

                fetch(finalChartUrl, { cache: "no-store" })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.candles && data.candles.length > 0) {
                            series.setData(data.candles);
                            chart.timeScale().fitContent();
                        } else {
                            throw new Error("K線資料格式不符");
                        }
                    })
                    .catch(err => {
                        console.warn("無法取得真實 K 線，啟用高擬真備用走勢", err);
                        // Fallback 至高擬真模擬資料，確保元件不崩潰
                        const basePrice = MOCK_STOCK_REGISTRY[selectedSymbol]?.price || 150;
                        const mockCandles = generateHistoricalData(selectedSymbol, basePrice);
                        series.setData(mockCandles);
                        chart.timeScale().fitContent();
                    })
                    .finally(() => {
                        setChartLoading(false);
                    });

                chartInstanceRef.current = chart;
                candlestickSeriesRef.current = series;

                const handleResize = () => {
                    if (chart && chartContainerRef.current) {
                        chart.applyOptions({ width: chartContainerRef.current.clientWidth });
                    }
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    chart.remove();
                    chartInstanceRef.current = null;
                    candlestickSeriesRef.current = null;
                };
            }, [selectedSymbol, theme, klineRange, gasUrl]);

            // 切換深色模式
            const toggleTheme = () => {
                const nextTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(nextTheme);
                if (nextTheme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            };

            // 雲端同步 POST 函式
            const syncToCloud = (currentList) => {
                if (!gasUrl.trim()) return;
                setSyncLoading(true);
                fetch(gasUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(currentList)
                })
                .then(() => {
                    triggerToast("☁️ 資料已成功即時同步至雲端試算表");
                    // 同步完畢後，1.5秒後自動重新拉取以確保取得最新注入的 Yahoo 資訊
                    setTimeout(loadDataFromCloud, 1500);
                })
                .catch(e => {
                    console.error("雲端同步錯誤", e);
                })
                .finally(() => {
                    setSyncLoading(false);
                });
            };

            // 新增自選
            const handleAddStockSubmit = () => {
                const sym = newSymbol.trim();
                if (!sym) {
                    setAddError("請輸入代號");
                    return;
                }
                if (watchlist.some(item => item.symbol === sym)) {
                    setAddError("該代號已在觀察名單中");
                    return;
                }

                const finalName = newNamePreview || `自訂(${sym})`;
                const newStock = {
                    id: Date.now().toString(),
                    symbol: sym,
                    name: finalName,
                    category: newCategory,
                    note: "",
                    quote: {}
                };

                const nextList = [...watchlist, newStock];
                setWatchlist(nextList);
                setSelectedSymbol(sym);
                setNewSymbol("");
                setNewNamePreview("");
                setShowAddModal(false);
                triggerToast(`已成功新增觀察：${sym}`);

                if (cloudSyncEnabled && gasUrl) {
                    syncToCloud(nextList);
                }
            };

            // 刪除自選
            const handleDeleteStock = (id, symbol, e) => {
                e.stopPropagation();
                const filtered = watchlist.filter(item => item.id !== id);
                setWatchlist(filtered);
                triggerToast(`已將 ${symbol} 自觀察清單移除`);
                
                if (selectedSymbol === symbol && filtered.length > 0) {
                    setSelectedSymbol(filtered[0].symbol);
                } else if (filtered.length === 0) {
                    setSelectedSymbol(null);
                }

                if (cloudSyncEnabled && gasUrl) {
                    syncToCloud(filtered);
                }
            };

            // 投資筆記與存檔
            const handleNoteChange = (symbol, text) => {
                setWatchlist(prev => prev.map(item => {
                    if (item.symbol === symbol) {
                        return { ...item, note: text };
                    }
                    return item;
                }));
            };

            const handleNoteBlur = () => {
                triggerToast("筆記已存檔，正在與雲端同步...");
                if (cloudSyncEnabled && gasUrl) {
                    syncToCloud(watchlist);
                }
            };

            // 搜尋過濾
            const filteredWatchlist = useMemo(() => {
                return watchlist.filter(item => {
                    const matchesSearch = item.symbol.includes(searchQuery) || item.name.includes(searchQuery);
                    if (!matchesSearch) return false;
                    if (activeTab === "stock") return item.category === "stock";
                    if (activeTab === "etf") return item.category === "etf";
                    return true;
                });
            }, [watchlist, searchQuery, activeTab]);

            // 強制測試連線
            const testGasConnection = () => {
                if (!gasUrl.trim()) {
                    triggerToast("請先輸入 Apps Script 部署 URL");
                    return;
                }
                setSyncLoading(true);
                
                const cacheBuster = `_t=${Date.now()}`;
                const finalUrl = gasUrl.includes('?') ? `${gasUrl}&${cacheBuster}` : `${gasUrl}?${cacheBuster}`;

                fetch(finalUrl, { 
                    method: "GET", 
                    mode: "cors",
                    cache: "no-store"
                })
                    .then(response => {
                        if (response.ok) {
                            return response.json();
                        }
                        throw new Error("HTTP error");
                    })
                    .then(data => {
                        setCloudConnected(true);
                        setLoadError(false);
                        triggerToast("🎉 雲端連線測試成功！已自動校準台股即時價格。");
                        if (data && data.watchlist) {
                            setWatchlist(data.watchlist);
                        }
                    })
                    .catch(() => {
                        triggerToast("☁️ 正在連線至雲端試算表 API...");
                        loadDataFromCloud();
                    })
                    .finally(() => {
                        setSyncLoading(false);
                    });
            };

            const activeStockInfo = watchlist.find(item => item.symbol === selectedSymbol);
            const selectedQuote = activeStockInfo ? activeStockInfo.quote : null;

            return (
                <div className="flex flex-col h-screen min-h-0 bg-slate-50 dark:bg-darkBg overflow-hidden">
                    
                    {/* === 1. 頂部導覽列 === */}
                    <header className="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm shrink-0">
                        <div className="flex items-center space-x-3">
                            <div className="bg-upRed text-white p-1.5 rounded-lg">
                                <Icons.TrendingUp />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800 dark:text-white">台股報價自選面板 Pro</h1>
                                <p className="text-xs text-slate-500 dark:text-slate-400">Yahoo API 實時對接 • Google 雲端雙向同步</p>
                            </div>

                                                    <div className="bg-slate-50 dark:bg-slate-900/40 p-3 rounded-xl border border-slate-100 dark:border-slate-800">
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">最低價</p>
                                                        <p className="text-sm font-extrabold text-downGreen mt-1 font-mono">
                                                            {safeToFixed(selectedQuote?.low)}
                                                        </p>
                                                    </div>
                                                    <div className="bg-slate-50 dark:bg-slate-900/40 p-3 rounded-xl border border-slate-100 dark:border-slate-800">
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">昨收價</p>
                                                        <p className="text-sm font-extrabold text-slate-700 dark:text-slate-200 mt-1 font-mono">
                                                            {selectedQuote && selectedQuote.price !== null && selectedQuote.price !== undefined && selectedQuote.change !== null && selectedQuote.change !== undefined
                                                                ? safeToFixed(selectedQuote.price - selectedQuote.change) 
                                                                : "—"}
                                                        </p>
                                                    </div>
                                                    <div className="bg-slate-50 dark:bg-slate-900/40 p-3 rounded-xl border border-slate-100 dark:border-slate-800 col-span-2 md:col-span-1">
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">今日成交量</p>
                                                        <p className="text-sm font-extrabold text-slate-700 dark:text-slate-200 mt-1 font-mono">
                                                            {selectedQuote && selectedQuote.volume !== null && selectedQuote.volume !== undefined 
                                                                ? Number(selectedQuote.volume).toLocaleString() 
                                                                : "—"}{" "}
                                                            <span className="text-[10px] text-slate-400">股</span>
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* TradingView K 線圖 */}
                                            <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col">
                                                <div className="flex items-center justify-between mb-4">
                                                    <div className="flex items-center space-x-2">
                                                        <span className="w-2.5 h-2.5 rounded-full bg-indigo-600 animate-pulse"></span>
                                                        <h3 className="font-bold text-sm text-slate-800 dark:text-white flex items-center space-x-2">
                                                            <span>真實 Yahoo 財經歷史走勢資料</span>
                                                            {chartLoading && <span className="text-xs text-indigo-500 font-semibold">(載入K線中...)</span>}
                                                        </h3>
                                                    </div>
                                                    
                                                    {/* 時間範圍選擇器 */}
                                                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg">
                                                        {['1M', '3M', '6M'].map(range => (
                                                            <button 
                                                                key={range}
                                                                onClick={() => setKlineRange(range)}
                                                                className={`px-3 py-1 text-xs font-bold rounded-md transition ${klineRange === range ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-800 dark:hover:text-slate-150'}`}
                                                            >
                                                                {range === '1M' ? '30天' : range === '3M' ? '90天' : '半年'}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                {/* K線畫布 */}
                                                <div ref={chartContainerRef} className="w-full h-[320px] bg-white dark:bg-slate-800 rounded-xl overflow-hidden" />
                                            </div>

                                            {/* 投資筆記編輯欄位 */}
                                            <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800">
                                                <div className="flex items-center justify-between mb-3">
                                                    <h3 className="font-bold text-sm text-slate-800 dark:text-white flex items-center space-x-2">
                                                        <span className="text-amber-500">✍️</span>
                                                        <span>自選股操作筆記（滑鼠離開編輯框時將自動上傳存檔）</span>
                                                    </h3>
                                                </div>
                                                <textarea 
                                                    value={activeStockInfo.note || ""}
                                                    onChange={(e) => handleNoteChange(selectedSymbol, e.target.value)}
                                                    onBlur={handleNoteBlur}
                                                    placeholder="在此輸入該觀察股的進出場策略、籌碼分析壓力關卡或季報基本面追蹤筆記..."
                                                    className="w-full h-32 px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-800 dark:text-slate-150 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                                />
                                            </div>
                                        </>
                                    ) : (
                                        <div className="p-12 text-center text-slate-400">
                                            請在左側自選名單選擇股票以展示細部 K 線及財報資料 📈
                                        </div>
                                    )}
                                </div>
                            )}
                        </section>
                    </main>

                    {/* === 5. 新增自選股票對話框 === */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 backdrop-blur-sm p-4">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl shadow-2xl border border-slate-150 dark:border-slate-700/60 p-6 transform transition-all">
                                <div className="flex items-center justify-between pb-4 border-b border-slate-100 dark:border-slate-700/60">
                                    <h3 className="text-base font-bold text-slate-800 dark:text-white">新增台股觀察自選</h3>
                                    <button 
                                        onClick={() => setShowAddModal(false)}
                                        className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-lg"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <div className="py-4 space-y-4">
                                    {/* 輸入代號 */}
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-bold text-slate-500">股票或 ETF 代號</label>
                                        <input 
                                            type="text"
                                            value={newSymbol}
                                            onChange={(e) => setNewSymbol(e.target.value)}
                                            placeholder="請輸入代號 (例如: 2330, 0050)"
                                            className="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-800 dark:text-slate-150 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                    </div>

                                    {/* 自動偵測預覽 */}
                                    {newNamePreview && (
                                        <div className="p-3 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                            <div className="flex flex-col">
                                                <span className="text-xs text-slate-400">偵測代號</span>
                                                <span className="text-sm font-bold text-slate-800 dark:text-white">{newNamePreview}</span>
                                            </div>
                                            <div className="flex flex-col items-end">
                                                <span className="text-xs text-slate-400">建議分類</span>
                                                <span className={`px-2 py-0.5 text-[10px] font-bold rounded mt-1 ${newCategory === 'etf' ? 'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700' : 'bg-red-100 dark:bg-red-900/40 text-red-700'}`}>
                                                    {newCategory === 'etf' ? 'ETF 基金' : '一般個股'}
                                                </span>
                                            </div>
                                        </div>
                                    )}

                                    {/* 分類確認 */}
                                    <div className="space-y-1.5">
                                        <label className="text-xs font-bold text-slate-500">投資商品分類</label>
                                        <select 
                                            value={newCategory}
                                            onChange={(e) => setNewCategory(e.target.value)}
                                            className="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-800 dark:text-slate-150 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        >
                                            <option value="stock">一般個股 (股票)</option>
                                            <option value="etf">指數型/高股息基金 (ETF)</option>
                                        </select>
                                    </div>

                                    {addError && (
                                        <div className="text-xs text-red-500 font-semibold bg-red-50 dark:bg-red-950/20 p-2 rounded-lg">
                                            ⚠️ {addError}
                                        </div>
                                    )}
                                </div>

                                <div className="pt-4 border-t border-slate-100 dark:border-slate-700/60 flex space-x-3">
                                    <button 
                                        onClick={() => setShowAddModal(false)}
                                        className="flex-1 py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 text-slate-700 dark:text-slate-200 text-sm font-bold rounded-xl transition"
                                    >
                                        取消
                                    </button>
                                    <button 
                                        onClick={handleAddStockSubmit}
                                        className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl transition shadow-md"
                                    >
                                        確定加入
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* === 6. Toast 提示 === */}
                    {toastMsg && (
                        <div className="fixed bottom-6 right-6 z-50 bg-slate-900 dark:bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl border border-slate-700 flex items-center space-x-2 animate-bounce">
                            <span className="text-indigo-400">💡</span>
                            <span className="text-xs font-bold">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        }

        // 常規台股清單對照組
        const MOCK_STOCK_REGISTRY = {
            "2330": { name: "台積電", price: 1045, category: "stock" },
            "2317": { name: "鴻海", price: 212.5, category: "stock" },
            "2454": { name: "聯發科", price: 1350, category: "stock" },
            "0050": { name: "元大台灣50", price: 198.4, category: "etf" },
            "0056": { name: "元大高股息", price: 38.65, category: "etf" },
            "00878": { name: "國泰永續高股息", price: 22.90, category: "etf" },
            "00919": { name: "群益台灣精選高息", price: 25.10, category: "etf" },
            "00940": { name: "元大台灣價值高息", price: 9.65, category: "etf" }
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
